<script>
async function detectAndTranslate() {
  try {
    const geo = await fetch("https://ipapi.co/json/").then(r=>r.json());
    const lang = geo.languages || '';
    const country = geo.country || '';
    let target = null;

    const arabCountries = ['SA','AE','EG','IQ','KW','QA','BH','OM','JO','LB','MA','DZ','TN','LY','SD','YE','PS','SY'];
    if(arabCountries.includes(country)) target = 'ar';
    else if(!lang.startsWith('en')) target = 'en';

    if(!target) return;

    const priceRegex = /(\$\s?\d+[\d.,]*)|(USD\s?\d+[\d.,]*)|(\d+[\d.,]*\s?\$)/;

    const nodes = document.querySelectorAll("body *:not(script):not(style):not(noscript)");
    for(const el of nodes){
      if(el.children.length===0 && el.innerText && el.innerText.trim().length>1){
        const original = el.innerText.trim();
        if(priceRegex.test(original)) continue;

        const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(original)}&langpair=en|${target}`);
        const data = await res.json();
        if(data?.responseData?.translatedText){
          el.innerText = data.responseData.translatedText;
        }
      }
      if(el.placeholder && !priceRegex.test(el.placeholder)){
        const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(el.placeholder)}&langpair=en|${target}`);
        const data = await res.json();
        if(data?.responseData?.translatedText){
          el.placeholder = data.responseData.translatedText;
        }
      }
    }

    if(target==='ar'){
      document.documentElement.dir = 'rtl';
      document.body.style.direction = 'rtl';
      document.body.style.textAlign = 'right';
    }
  } catch(e){ console.log(e); }
}

document.addEventListener("DOMContentLoaded", detectAndTranslate);
</script>
